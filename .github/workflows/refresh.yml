name: 법령 데이터 자동 갱신

on:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전날). GitHub 크론은 UTC 기준.
    - cron: "0 22 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: law-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r builder/requirements.txt

      - name: 갱신 전 해시 (built_at 제외)
        id: before
        run: echo "hash=$(python .github/scripts/graph_hash.py)" >> "$GITHUB_OUTPUT"

      - name: 법령 재빌드
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: python builder/build_graph.py

      - name: 빌드 결과 검증 (빈 그래프 커밋 방지)
        run: |
          python - <<'PY'
          import json, sys
          m = json.load(open("data/graph.json", encoding="utf-8"))["meta"]
          print("law_count=%(law_count)s node_count=%(node_count)s edge_count=%(edge_count)s" % m)
          if m["node_count"] == 0 or m["law_count"] == 0:
              sys.exit("빌드 결과가 비어 있음 (법령/노드 0개) — API 키 또는 법제처 API 오류 의심. 커밋 중단.")
          PY

      - name: 갱신 후 해시
        id: after
        run: echo "hash=$(python .github/scripts/graph_hash.py)" >> "$GITHUB_OUTPUT"

      - name: 변경 시 커밋·푸시
        if: steps.before.outputs.hash != steps.after.outputs.hash
        run: |
          git config user.name "law-refresh-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/graph.json
          git commit -m "chore: 법령 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
          git push

      - name: 변경 없음
        if: steps.before.outputs.hash == steps.after.outputs.hash
        run: echo "법령 변경 없음 — 커밋 생략"
