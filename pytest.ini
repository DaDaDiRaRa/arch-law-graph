[pytest]
# 카드 추출 회귀 스냅샷 테스트 (C-1). 루트에서 `pytest` 로 실행.
#   - builder/tests/test_zoning_cards.py    용도지역(건폐율·용적률)
#   - builder/tests/test_landscape_cards.py 조경
# 골든 갱신(데이터 의도적 변경을 사람이 승인): `pytest --update-golden`
testpaths = builder/tests
python_files = test_*.py
addopts = -q
filterwarnings =
    ignore::DeprecationWarning
